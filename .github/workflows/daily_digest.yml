name: Daily DevOps Job Digest

on:
  schedule:
    - cron: '0 6 * * 1-5'   # 11:30 AM IST, Monday-Friday (6:00 AM UTC)
    - cron: '30 4 * * 6'    # 10:00 AM IST, Saturday (4:30 AM UTC)
  workflow_dispatch:        # Allows manual trigger

jobs:
  run-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create config.json
        env:
          CONFIG_JSON: ${{ secrets.CONFIG_JSON }}
        run: |
          echo "$CONFIG_JSON" > config.json

      - name: Create service_account.json
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$SERVICE_ACCOUNT_JSON" ]; then
            echo "$SERVICE_ACCOUNT_JSON" > service_account.json
          else
            echo "SERVICE_ACCOUNT_JSON secret is empty. Skipping."
          fi

      - name: Run Job Digest Scraper
        run: python digest.py

      - name: Commit and Push seen_jobs.json changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f seen_jobs.json
          git commit -m "chore: update seen_jobs.json [skip ci]" || echo "No changes to seen_jobs.json"
          git push
