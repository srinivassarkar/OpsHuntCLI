name: Daily DevOps Job Digest

on:
  schedule:
    - cron: '0 6 * * 1-5'   # 11:30 AM IST, Monday-Friday (6:00 AM UTC)
    - cron: '30 4 * * 6'    # 10:00 AM IST, Saturday (4:30 AM UTC)
  workflow_dispatch:        # Allows manual trigger

concurrency:
  group: opshunt-digest
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create config.json
        env:
          CONFIG_JSON: ${{ secrets.CONFIG_JSON }}
        run: |
          echo "$CONFIG_JSON" > config.json

      - name: Create service_account.json
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$SERVICE_ACCOUNT_JSON" ]; then
            echo "$SERVICE_ACCOUNT_JSON" > service_account.json
          else
            echo "SERVICE_ACCOUNT_JSON secret is empty. Skipping."
          fi

      - name: Run Job Digest Scraper
        run: python digest.py

      - name: Commit and Push seen_jobs.json changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f seen_jobs.json
          git commit -m "chore: update seen_jobs.json [skip ci]" || { echo "No changes to seen_jobs.json"; exit 0; }
          
          # Retry loop with pull --rebase to prevent conflicts if remote updates
          for i in {1..3}
          do
            echo "Attempting pull rebase and push (try $i)..."
            git pull --rebase origin main && git push origin main && echo "Successfully pushed seen_jobs.json!" && exit 0
            echo "Rebase/push failed. Retrying in 5 seconds..."
            sleep 5
          done
          echo "Failed to push seen_jobs.json after 3 attempts."
          exit 1
